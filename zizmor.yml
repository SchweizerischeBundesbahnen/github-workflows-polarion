---
rules:
  # Secrets are protected by GitHub's fork PR approval requirement,
  # which prevents untrusted workflows from accessing secrets without explicit approval.
  secrets-outside-env:
    ignore: [claude-code-review.yml, reusable-claude-code-review.yml]
  # claude-code-action needs git credentials for internal PR branch fetch.
  # Risk is minimal: token is read-only (contents: read) and runner is ephemeral.
  artipacked:
    ignore: [reusable-claude-code-review.yml]

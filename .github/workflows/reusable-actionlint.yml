---
name: ActionLint (reusable)
on:
  workflow_call:
    inputs:
      reporter:
        description: "Reviewdog reporter: github-check or github-pr-check"
        required: false
        type: string
        default: github-check
      fail_level:
        description: "Fail level: error, warning, info"
        required: false
        type: string
        default: error
permissions: {}
jobs:
  actionlint:
    name: Check GitHub Actions Workflows
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: true  # Required: reviewdog needs git credentials for diff fetch on private repos
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: ${{ inputs.reporter }}
          fail_level: ${{ inputs.fail_level }}
          level: error
          filter_mode: nofilter

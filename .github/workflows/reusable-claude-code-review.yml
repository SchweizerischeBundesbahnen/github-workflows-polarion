---
name: Claude Code Review (reusable)
on:
  workflow_call:
    inputs:
      extra_focus:
        description: Optional extra review focus (e.g. "check backward compatibility of the API changes")
        required: false
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
permissions: {}
jobs:
  claude-review:
    # Skip Claude review for bot PRs and fork PRs
    if: |
      !contains(github.event.pull_request.user.login, '[bot]') &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      actions: read  # Required for claude-code-action github_ci MCP server
      contents: read  # Security: read-only sufficient for reviews
      pull-requests: write
      issues: write  # Required for gh pr comment (PRs are issues)
      id-token: write  # Required for claude-code-action OIDC auth
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true  # Required: claude-code-action needs git credentials for PR branch fetch
      - name: Minimize outdated Claude comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch all claude[bot] comments matching summary or tracking patterns
          node_ids=$(gh api --paginate \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "claude[bot]" and (.body | test("Claude Code Review Summary|No issues found|No new issues found|Claude finished"))) | .node_id')

          for node_id in $node_ids; do
            echo "Minimizing comment $node_id"
            gh api graphql -f query="
              mutation {
                minimizeComment(input: {subjectId: \"$node_id\", classifier: OUTDATED}) {
                  minimizedComment { isMinimized }
                }
              }"
          done
      - name: Classify review threads
        id: classify-threads
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Fetch review threads AND PR-level reviews via GraphQL
          pr_json=$(gh api graphql -f query="
            query {
              repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") {
                pullRequest(number: $PR_NUMBER) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      comments(first: 1) {
                        nodes {
                          databaseId
                          body
                          path
                          line
                          author { login __typename }
                        }
                      }
                    }
                  }
                  reviews(first: 50) {
                    nodes {
                      id
                      databaseId
                      state
                      body
                      author { login __typename }
                    }
                  }
                }
              }
            }")

          # Classify threads deterministically
          echo "$pr_json" | jq --arg pr_author "$PR_AUTHOR" '
            .data.repository.pullRequest.reviewThreads.nodes | map(
              . as $thread |
              ($thread.comments.nodes[0].author // {login: "unknown", __typename: "User"}) as $author |
              {
                thread_id: $thread.id,
                is_resolved: $thread.isResolved,
                comment_id: $thread.comments.nodes[0].databaseId,
                path: $thread.comments.nodes[0].path,
                line: $thread.comments.nodes[0].line,
                body: ($thread.comments.nodes[0].body // "")[0:200],
                author_login: $author.login,
                author_type: $author.__typename,
                category: (
                  if $author.__typename == "Bot" and $author.login == "claude" then "claude"
                  elif $author.__typename == "Bot" then "bot"
                  elif $author.login == $pr_author then "pr_author"
                  else "human"
                  end
                )
              }
            ) | {
              claude_threads: [.[] | select(.category == "claude")],
              bot_threads: [.[] | select(.category == "bot")],
              human_threads: [.[] | select(.category == "human")],
              pr_author_threads: [.[] | select(.category == "pr_author")]
            }' > /tmp/classified-threads.json

          # Classify PR-level reviews deterministically (skip PENDING)
          echo "$pr_json" | jq --arg pr_author "$PR_AUTHOR" '
            .data.repository.pullRequest.reviews.nodes
            | map(select(.state != "PENDING"))
            | map(
              . as $review |
              ($review.author // {login: "unknown", __typename: "User"}) as $author |
              {
                review_id: $review.id,
                review_db_id: $review.databaseId,
                state: $review.state,
                body: ($review.body // "")[0:200],
                author_login: $author.login,
                author_type: $author.__typename,
                category: (
                  if $author.__typename == "Bot" then "bot"
                  elif $author.login == $pr_author then "pr_author"
                  else "human"
                  end
                )
              }
            ) | {
              human_reviews: [.[] | select(.category == "human")],
              bot_reviews: [.[] | select(.category == "bot")]
            }' > /tmp/classified-reviews.json

          echo "=== Thread classification ==="
          jq '{
            claude: (.claude_threads | length),
            bot: (.bot_threads | length),
            human: (.human_threads | length),
            pr_author: (.pr_author_threads | length)
          }' /tmp/classified-threads.json

          echo "=== Review classification ==="
          jq '{
            human: (.human_reviews | length),
            bot: (.bot_reviews | length)
          }' /tmp/classified-reviews.json
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@2ff1acb3ee319fa302837dad6e17c2f36c0d98ea  # v1.0.91
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            EXTRA REVIEW FOCUS: ${{ inputs.extra_focus }}

            The PR branch is already checked out. Use Read/Grep/Glob to
            search the codebase for context.

            1. Read CLAUDE.md and any files it references to learn project
            conventions and review standards.

            2. Get the PR diff with `gh pr diff`. Read both classified JSON files:

            `/tmp/classified-threads.json` — inline review threads:
            ```json
            {
              "claude_threads": [...],   // threads authored by claude (Bot)
              "bot_threads": [...],      // threads by other bots (Copilot, Greptile, etc.)
              "human_threads": [...],    // threads by human reviewers (not PR author)
              "pr_author_threads": [...]  // threads by the PR author (excluded from triage)
            }
            ```
            Each thread has: `thread_id`, `is_resolved`, `comment_id`, `path`,
            `line`, `body` (first 200 chars), `author_login`, `author_type`, `category`.

            `/tmp/classified-reviews.json` — PR-level reviews (review bodies):
            ```json
            {
              "human_reviews": [...],  // PR-level reviews by human reviewers
              "bot_reviews": [...]     // PR-level reviews by bots
            }
            ```
            Each review has: `review_id`, `review_db_id`, `state` (APPROVED,
            CHANGES_REQUESTED, COMMENTED, DISMISSED), `body` (first 200 chars),
            `author_login`, `author_type`, `category`.

            Use ONLY these classifications — do NOT re-classify threads or
            reviews yourself. Also fetch REST comments
            (`gh api --paginate .../pulls/NUMBER/comments`) to get `node_id`
            for minimize mutations. Do NOT re-report already-flagged issues.

            3. MANDATORY — Process ALL previous Claude review threads.
            Use `claude_threads` from the classified JSON.
            Do NOT skip this step even if you find no new issues. For each
            UNRESOLVED thread (`is_resolved == false`), read the CURRENT file
            content (use Read tool, not the diff) and classify:
            - FIXED: resolve and minimize:
              `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'`
              `gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "COMMENT_NODE_ID", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'`
            - STILL PRESENT: leave open, count in summary
            - ALREADY RESOLVED: skip
            Note: use thread `thread_id` for resolveReviewThread, comment `node_id`
            (from REST) for minimizeComment. You cannot score 5/5 confidence
            if unresolved issues remain.

            4. MANDATORY — Triage bot reviewer comments (Copilot, Greptile, etc.).
            First, if Copilot is enabled, wait for it:
            `gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs --jq '.check_runs[] | select(.name == "Copilot code review") | {status, conclusion}'`
            If in_progress, poll every 30s (max 5 min).
            Use `bot_threads` from the classified JSON.
            For each UNRESOLVED thread (`is_resolved == false`), read the
            CURRENT file content and classify:
            - FIXED: reply, resolve, and minimize:
              `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Fixed — this issue has been addressed in the current code."`
              `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'`
              `gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "COMMENT_NODE_ID", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'`
            - VALID: leave open, count in summary
            - FALSE POSITIVE: reply with reason, resolve thread:
              `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Dismissed — <reason>."`
              `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'`
            Dismiss cosmetic nitpicks — only acknowledge real bugs/security issues.

            5. MANDATORY — Triage human reviewer feedback.
            This covers BOTH inline threads AND PR-level reviews.

            5a. Inline threads: use `human_threads` from classified-threads.json.
            For each UNRESOLVED thread (`is_resolved == false`), read the
            CURRENT file content and classify:
            - FIXED: reply acknowledging the fix, then resolve:
              `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Thanks — this has been addressed in the current code."`
              `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'`
            - VALID: reply acknowledging the feedback, then leave open for
              the PR author to address. Do NOT resolve valid human comments
              — only humans should resolve human feedback.
              `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Acknowledged — flagging for the PR author to address."`
            - ALREADY RESOLVED: skip

            5b. PR-level reviews: use `human_reviews` from classified-reviews.json.
            For each review with a non-empty `body`, read the review body and
            classify the feedback. PR-level reviews don't have threads to
            resolve — just acknowledge them in the summary (step 8).
            If a review has `state == "CHANGES_REQUESTED"`, treat its feedback
            as high-priority.

            Human reviewer feedback is high-signal — treat it with respect.
            Do NOT dismiss human comments as false positives or cosmetic nitpicks.
            If unsure whether an issue is fixed, leave it open.

            6. MANDATORY — Review the PR diff for new issues.
            This is the core review step. Read each changed file in the diff
            and analyze the NEW code (+ side) for:
            - Bugs or logic errors (use-before-assignment, off-by-one, unreachable code)
            - Security vulnerabilities (SQL injection, XSS, auth bypass, secrets exposure)
            - Breaking changes not mentioned in the PR description
            - CLAUDE.md violations (verify the rule exists and quote it)
            - Missing error handling in new code paths
            - Missing tests for new functionality
            - Critical performance issues (N+1 queries, unnecessary allocations in hot paths)
            For each potential issue, assess confidence 0-100. Only report
            issues scoring >= 80. Do NOT review unchanged code, style/formatting,
            optional improvements, or dependency versions.

            7. Post inline comments for issues found in step 6 using
            `mcp__github_inline_comment__create_inline_comment`
            with `confirmed: true`. Only comment on lines in the diff (NEW version).
            Use `startLine` + `line` for multi-line ranges. Format each comment:
            severity emoji + one-sentence summary + fix suggestion, then a
            collapsible `<details>` block with extended reasoning.
            Emojis: 🔴 bug, 🟠 security, 🟡 risky pattern, 🔵 CLAUDE.md violation.
            If `mcp__github_inline_comment__create_inline_comment` fails
            (line not in diff, validation error, etc.), DROP the finding.
            Do NOT fall back to reporting it in the summary (step 8).

            8. Submit a formal PR review via `gh pr review` with this structure.
            ALWAYS use `--event COMMENT`. NEVER use `REQUEST_CHANGES` or
            `APPROVE`:
            - `REQUEST_CHANGES` from a bot creates a merge blocker that
              only the bot can dismiss — the PR author cannot clear it.
            - `APPROVE` from a bot can silently satisfy branch protection
              approval requirements, bypassing human review gates.
            Severity is communicated through inline comments and the
            confidence score, not the review event type.
            The review body should contain:
            - `## Claude Code Review Summary` (or `## ✅ No issues found` /
              `## ℹ️ No new issues found — N bot reviewer finding(s) and M human reviewer finding(s) acknowledged`)
            - `<details><summary><h3>Confidence Score: X/5</h3></summary>`
              with brief assessment (5/5 = simple changes fully understood,
              3/5 = complex changes needing human judgment)
            - `<details><summary><h3>Bot Review Triage</h3></summary>`
              with triage of `bot_threads` ONLY, grouped by `author_login`
              (OMIT if `bot_threads` is empty)
            - `<details><summary><h3>Human Review Triage</h3></summary>`
              with triage of `human_threads` AND `human_reviews`, grouped by
              `author_login`. Show each item's classification (FIXED/VALID)
              and action taken. Separate inline threads from PR-level reviews.
              (OMIT if both `human_threads` and `human_reviews` are empty)
            - `<details><summary><h3>Important Files Changed</h3></summary>`
              with markdown table (filename | overview)
            Example: `gh pr review ${{ github.event.pull_request.number }} --event COMMENT --body "review body here"`
            CRITICAL: Use ONLY the pre-classified categories from
            `/tmp/classified-threads.json` and `/tmp/classified-reviews.json`
            for the summary sections. Do NOT re-classify threads/reviews or
            attribute them to different authors.
            `claude_threads` go in step 3 processing only (not in summary sections).
            `bot_threads` go in Bot Review Triage only.
            `human_threads` + `human_reviews` go in Human Review Triage only.
            `pr_author_threads` are excluded from all triage sections.
            The review body MUST contain ONLY these sections: the `##`
            heading, Confidence Score, Bot Review Triage, Human Review
            Triage, Important Files Changed. Do NOT add ad-hoc sections
            describing findings. File/line-level findings belong in
            inline comments (step 7) ONLY. If an issue cannot be posted
            as an inline comment, it is not reported.

            RULES:
            - Before reporting that a string is stale or wrong, you MUST
              `Read` the file and verify the exact claimed text appears on
              the claimed line. Quote from the Read output verbatim, never
              from memory. If the text is not in the Read output, drop it.
            - Every API call is permanent. Do NOT post test or placeholder comments.
            - Only post GitHub review submissions — don't submit review text as messages.
            - Do NOT run build tools or provide praise.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read", "Grep", "Glob", "BatchTool",
                  "mcp__github_inline_comment__create_inline_comment",
                  "Bash(gh pr review:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh api:*)"
                ]
              }
            }
          claude_args: --max-turns 30 --model opus

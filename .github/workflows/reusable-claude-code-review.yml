---
name: Claude Code Review (reusable)
on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
permissions: {}
jobs:
  claude-review:
    # Skip Claude review for bot PRs and fork PRs
    if: |
      !contains(github.event.pull_request.user.login, '[bot]') &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Security: read-only sufficient for reviews
      pull-requests: write
      issues: write  # Required for gh pr comment (PRs are issues)
      id-token: write  # Required for claude-code-action OIDC auth
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false  # Security: don't persist credentials
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44  # v1.0.70
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
            STEP 1: Read CLAUDE.md and any files it references to learn project
            conventions, architecture decisions, and review standards.
            STEP 2: Gather context for the review:
            a) Get the full PR diff: `gh pr diff --repo ${{ github.repository }} ${{ github.event.pull_request.number }}`
            b) Fetch existing review comments AND review threads from previous runs:
               `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.user.login == "claude[bot]") | {id, node_id, path, line, body}'`
               ```
               gh api graphql -f query='query {
                 repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                   pullRequest(number: ${{ github.event.pull_request.number }}) {
                     reviewThreads(first: 100) {
                       nodes {
                         id
                         isResolved
                         comments(first: 1) {
                           nodes { author { login } body path line }
                         }
                       }
                     }
                   }
                 }
               }'
               ```
            Review the full PR diff but DO NOT re-report issues that were already
            flagged in previous review comments. If a previously flagged issue has
            been fixed, do not mention it again. Only report NEW issues not already
            covered by existing comments.
            CONFIDENCE RULE: For each potential issue, assess confidence 0-100.
            Only report issues scoring >= 80. If uncertain, do not flag it.
            False positives waste reviewer time.
            For CLAUDE.md violations: verify the rule exists and quote it.
            Pre-existing issues on unchanged lines: ignore.
            FOCUS ON:
            - Bugs or logic errors
            - Security vulnerabilities (SQL injection, XSS, auth bypass, secrets exposure)
            - Breaking changes not mentioned in PR description
            - Clear CLAUDE.md violations (cite the specific rule)
            - Missing null/error handling in new code paths
            - Missing tests for new functionality
            - Critical performance issues introduced by changes
            DO NOT:
            - Review unchanged code, style/formatting, or optional improvements
            - Run build tools
            - Check external dependency versions
            - Provide praise or summaries of what the code does
            GUIDELINES:
            - Use Read/Grep/Glob to search the codebase for context
            - The PR branch is already checked out
            STEP 3: MANDATORY — Process ALL previous review threads.
            You MUST process every unresolved review thread from step 2b authored by
            claude[bot]. For each one, read the CURRENT file content (use Read tool,
            not just the diff) and classify the thread into one of three cases:
            A) FIXED — the issue no longer exists in the current code. Resolve AND
               minimize the comment:
               ```
               gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'
               gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "COMMENT_NODE_ID", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'
               ```
            B) STILL PRESENT — the issue was NOT fixed. Leave the thread open.
               Count it as an open issue in your Step 7 summary.
            C) ALREADY RESOLVED — skip, no action needed.
            Use the thread `id` from the reviewThreads query and the `node_id` from
            the comments REST API response fetched in step 2b.
            Do NOT skip this step even if you find no new issues.
            The confidence score in Step 7 MUST account for still-open issues from
            previous reviews — you cannot score 5/5 if unresolved issues remain.
            STEP 4: Triage Copilot review comments.
            First, wait for Copilot code review to finish. Check the PR's
            check runs for "Copilot code review":
            ```
            gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs --jq '.check_runs[] | select(.name == "Copilot code review") | {status, conclusion}'
            ```
            - If no result: Copilot is not enabled. Skip waiting and proceed
              to triage any existing threads from previous commits.
            - If status is "queued" or "in_progress": poll every 30 seconds
              (up to 5 minutes max) until status is "completed", then proceed.
            - If status is "completed": proceed immediately.
            If no Copilot threads exist after checking, skip to Step 5.
            a) Fetch all unresolved review threads on this PR and filter for
               those authored by Copilot:
               ```
               gh api graphql -f query='query {
                 repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                   pullRequest(number: ${{ github.event.pull_request.number }}) {
                     reviewThreads(first: 100) {
                       nodes {
                         id
                         isResolved
                         comments(first: 1) {
                           nodes { author { login } body path line }
                         }
                       }
                     }
                   }
                 }
               }'
               ```
               Filter for threads where author login is "Copilot" and
               isResolved is false.
            b) Also fetch comment node_ids for the Copilot comments:
               `gh api --paginate repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.user.login == "Copilot") | {id, node_id, path, line, body}'`
            c) For each unresolved Copilot thread, read the CURRENT file
               content and classify:
               A) FIXED — the issue no longer exists. Reply explaining it was
                  fixed and resolve the thread:
                  ```
                  gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Fixed — this issue has been addressed in the current code."
                  gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'
                  gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "COMMENT_NODE_ID", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'
                  ```
               B) VALID — the finding is correct and actionable. Leave thread
                  open. Count it in the Step 7 summary.
               C) FALSE POSITIVE — the finding is incorrect or irrelevant.
                  Reply with a short explanation of why and resolve the thread:
                  ```
                  gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/COMMENT_ID/replies --method POST -f body="Dismissed — <reason why this is not applicable>."
                  gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_ID"}) { thread { isResolved } } }'
                  ```
            IMPORTANT: Critically evaluate each Copilot finding. Do NOT treat
            all findings as valid. Dismiss cosmetic nitpicks, style preferences,
            and findings that don't apply to this repo. Only acknowledge findings
            that identify real bugs, security issues, or meaningful improvements.
            STEP 5: Submit your review as INLINE COMMENTS on the specific lines where
            issues are found, using the GitHub Pull Request Review API.
            To submit, pipe JSON via stdin to `gh api --input -`:
            ```
            echo '{
              "commit_id": "${{ github.event.pull_request.head.sha }}",
              "event": "COMMENT",
              "body": "",
              "comments": [
                {"path": "path/to/file.py", "line": 42, "body": "comment body here"}
              ]
            }' | gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --method POST --input -
            ```
            IMPORTANT: The `line` field must refer to a line number in the NEW version of
            the file (the + side of the diff). Only comment on lines that appear in the diff.
            For multi-line issues, use `start_line` and `line` to span a range (both on the
            same side, i.e. `side: "RIGHT"` and `start_side: "RIGHT"`).
            Each inline comment MUST use this format:
            - First line: severity emoji + concise one-sentence summary + fix suggestion
            - Then a collapsible details block with extended reasoning
            Severity emojis:
            🔴 Bug / will break at runtime
            🟠 Security vulnerability
            🟡 Likely bug / risky pattern
            🔵 CLAUDE.md violation
            Example comment body:
            ```
            🔴 Variable `data` is used before assignment on the else branch. Fix: initialize `data = {}` before the if/else block.
            <details>
            <summary>Extended reasoning...</summary>

            ## What the bug is
            ...detailed explanation...

            ## Step-by-step proof
            1. ...
            2. ...

            ## Impact
            ...

            ## How to fix
            ...code example...
            </details>
            ```
            STEP 6: MANDATORY — Minimize outdated Claude summary comments.
            Before posting a new summary, find and minimize all previous PR
            comments authored by claude[bot] that contain "Claude Code Review
            Summary" or "No issues found" or "No new issues found".
            a) Fetch all issue comments on the PR (use --paginate to get all pages):
               `gh api --paginate repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.user.login == "claude[bot]" and (.body | test("Claude Code Review Summary|No issues found|No new issues found"))) | {node_id, body}'`
            b) For each comment returned by the query above, minimize it as outdated:
               ```
               gh api graphql -f query='mutation { minimizeComment(input: {subjectId: "COMMENT_NODE_ID", classifier: OUTDATED}) { minimizedComment { isMinimized } } }'
               ```
            Do NOT skip this step. Old summaries clutter the PR conversation.
            STEP 7: Post a PR comment summary using `gh pr comment`.
            You MUST use the EXACT HTML structure below — do NOT omit <details>
            tags, do NOT replace the markdown table with a list, do NOT change
            heading levels. Copy the template and only fill in the placeholders.
            If issues were found:
            ```
            gh pr comment --repo ${{ github.repository }} ${{ github.event.pull_request.number }} --body "$(cat <<'EOF'
            ## Claude Code Review Summary
            Found **N** issue(s) as inline review comments.
            <details><summary><h3>Confidence Score: X/5</h3></summary>
            - Brief overall assessment of the PR safety/quality
            - Note any files that require special attention
            </details>
            <details><summary><h3>Copilot Review Triage</h3></summary>
            Triaged N Copilot comment(s): X resolved (fixed), Y dismissed (false positive), Z acknowledged (valid, left open).
            - List each triaged comment with a one-line summary of the action taken
            </details>
            <details><summary><h3>Important Files Changed</h3></summary>
            | Filename | Overview |
            |----------|----------|
            | `path/to/file.py` | Brief description of changes |
            </details>
            EOF
            )"
            ```
            If NO Claude issues found:
            ```
            gh pr comment --repo ${{ github.repository }} ${{ github.event.pull_request.number }} --body "$(cat <<'EOF'
            ## ✅ No issues found
            Checked for bugs, security vulnerabilities, and CLAUDE.md compliance.
            <details><summary><h3>Confidence Score: X/5</h3></summary>
            - Brief overall assessment of the PR safety/quality
            - This PR is safe to merge (or note any minor observations)
            </details>
            <details><summary><h3>Copilot Review Triage</h3></summary>
            Triaged N Copilot comment(s): X resolved (fixed), Y dismissed (false positive), Z acknowledged (valid, left open).
            - List each triaged comment with a one-line summary of the action taken
            </details>
            <details><summary><h3>Important Files Changed</h3></summary>
            | Filename | Overview |
            |----------|----------|
            | `path/to/file.py` | Brief description of changes |
            </details>
            EOF
            )"
            ```
            Omit the "Copilot Review Triage" section entirely if no Copilot
            threads were found in Step 4.
            The overall confidence score reflects how thoroughly the changes could be
            reviewed (5/5 = simple/clear changes fully understood, 3/5 = complex changes
            with areas that need human judgment).
            IMPORTANT: Do NOT post test, placeholder, or dry-run comments.
            Every API call you make is permanent. Only post your final review.
            Only post GitHub comments — don't submit review text as messages.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read", "Grep", "Glob", "BatchTool",
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(gh api:*)"
                ]
              }
            }
          claude_args: --max-turns 30

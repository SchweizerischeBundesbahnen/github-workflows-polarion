---
name: Claude Code Review Triage
on:
  pull_request_review:
    types: [submitted]
permissions: {}
jobs:
  triage:
    uses: ./.github/workflows/reusable-claude-code-review-triage.yml
    with:
      reviewer-login: ${{ github.event.review.user.login }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

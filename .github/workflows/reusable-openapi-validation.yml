---
name: OpenAPI Validation (reusable)
on:
  workflow_call:
    inputs:
      spec-path:
        description: Path to the OpenAPI spec file (e.g. docs/openapi.json)
        required: true
        type: string
      node-version:
        description: Node.js version for redocly CLI
        required: false
        type: string
        default: "24"
      redocly-args:
        description: Additional arguments for redocly lint
        required: false
        type: string
        default: ""
permissions: {}
jobs:
  validate-openapi:
    name: Validate OpenAPI Definition
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Validate OpenAPI definition
        env:
          SPEC_PATH: ${{ inputs.spec-path }}
          REDOCLY_ARGS: ${{ inputs.redocly-args }}
        shell: bash
        run: |
          # shellcheck disable=SC2086
          npx @redocly/cli@latest lint "$SPEC_PATH" --format=github-actions $REDOCLY_ARGS

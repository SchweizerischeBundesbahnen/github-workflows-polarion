---
name: Claude Code Review
on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  claude-review:
    uses: ./.github/workflows/reusable-claude-code-review.yml
    permissions:
      actions: read
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    with:
      extra_focus: Pay extra attention to GitHub Actions security (zizmor, artipacked, persist-credentials, SHA pinning).
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

---
name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions: {}
jobs:
  stale:
    if: github.repository != 'SchweizerischeBundesbahnen/open-source-repo-template'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. Thank you for your contribution.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs. Thank you for your contribution.
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,keep
          exempt-pr-labels: pinned,keep
